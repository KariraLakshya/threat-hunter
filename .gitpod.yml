image: gitpod/workspace-full

tasks:
  - name: Setup Threat Hunter
    init: |
      echo "=== Installing dependencies ==="
      pip install -r requirements.txt
    command: |
      echo "=== Threat Hunter Gitpod Environment ==="
      # Gitpod auto-injects secrets as env vars, just like Codespaces
      bash setup_codespace.sh
      
      echo "=== Starting ELK Stack ==="
      docker compose up -d
      
      echo "Waiting 60s for Elasticsearch to be ready..."
      sleep 60
      curl -s http://localhost:9200/_cluster/health -u elastic:changeme123 || true
      
      echo ""
      echo "✅ Stack is up! Now you can run:"
      echo "  1. uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload &"
      echo "  2. python tests/inject_logs.py"
      echo "  3. python tests/inject_cloud_logs.py"

ports:
  - port: 9200
    onOpen: ignore-and-inform
    visibility: private
    name: Elasticsearch
  - port: 5601
    onOpen: open-browser
    visibility: private
    name: Kibana
  - port: 8000
    onOpen: ignore
    visibility: public
    name: FastAPI
  - port: 8501
    onOpen: open-browser
    visibility: public
    name: Streamlit
  - port: 5000
    onOpen: ignore
    visibility: private
    name: Logstash
  - port: 6379
    onOpen: ignore
    visibility: private
    name: Redis

vscode:
  extensions:
    - ms-python.python
    - ms-python.vscode-pylance
    - rangav.vscode-thunder-client
