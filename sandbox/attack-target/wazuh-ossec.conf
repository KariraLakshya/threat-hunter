<!--
  Wazuh Agent OSSEC Configuration
  This bridges the sandbox Ubuntu container to the host's Wazuh Manager
-->
<ossec_config>
  <client>
    <server>
      <!-- This address is patched at runtime by entrypoint.sh -->
      <address>threat-hunter-wazuh</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22.04</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- Log analysis -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- File integrity monitoring (FIM) for File Drop / Configuration tampering -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    
    <directories realtime="yes" check_all="yes">/tmp</directories>
    <directories realtime="yes" check_all="yes">/var/spool/cron</directories>
    <directories realtime="yes" check_all="yes">/etc/cron.d</directories>
    <directories realtime="yes" check_all="yes">/opt/backup</directories>
  </syscheck>
</ossec_config>
