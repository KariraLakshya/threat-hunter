# ═══════════════════════════════════════════════════════════
#  Logstash Pipeline — On-Premise Log Ingestion
#  Phase 1: Accepts Beats (5044) and TCP/JSON (5000)
# ═══════════════════════════════════════════════════════════

# ── INPUTS ─────────────────────────────────────────────────
input {

  # Beats input — Wazuh agents, Filebeat, Winlogbeat
  beats {
    port => 5044
  }

  # TCP/JSON input — cloud collectors, test scripts
  tcp {
    port => 5000
    codec => json_lines
  }
}

# ── FILTERS ────────────────────────────────────────────────
filter {

  # --- Parse JSON if present (Wazuh via Filebeat) ---
  json {
    source => "message"
    target => "parsed_json"
    skip_on_invalid_json => true
  }

  if [parsed_json] {
    # Extract key fields from the Wazuh alert structure
    mutate {
      add_field => {
        "user" => "%{[parsed_json][data][dstuser]}"
        "source_ip" => "%{[parsed_json][data][srcip]}"
      }
    }
  }

  # --- Tag all on-premise logs ---
  if ![environment] {
    mutate {
      add_field => { "environment" => "on-premise" }
    }
  }

  # --- Parse syslog-style auth logs ---
  if [message] =~ "sshd" or [message] =~ "Failed password" or [message] =~ "Accepted password" {

    grok {
      match => {
        "message" => [
          # Failed SSH login
          "Failed password for (invalid user )?%{USERNAME:user} from %{IP:source_ip} port %{NUMBER:source_port} ssh2",
          # Successful SSH login
          "Accepted password for %{USERNAME:user} from %{IP:source_ip} port %{NUMBER:source_port} ssh2",
          "Accepted publickey for %{USERNAME:user} from %{IP:source_ip} port %{NUMBER:source_port} ssh2",
          # Generic sshd
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:hostname} sshd\\[%{NUMBER:pid}\\]: %{GREEDYDATA:sshd_message}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_sshd"]
    }

    # Classify event type
    if [message] =~ "Failed password" {
      mutate { add_field => { "event_type" => "failed_login" } }
      mutate { add_field => { "severity" => "low" } }
    } else if [message] =~ "Accepted password" or [message] =~ "Accepted publickey" {
      mutate { add_field => { "event_type" => "successful_login" } }
      mutate { add_field => { "severity" => "medium" } }
    }
  }

  # --- Suricata EVE JSON alerts ---
  if [event_type_suricata] == "alert" or ([source] == "suricata" and [alert]) {
    mutate {
      add_field => { "event_type" => "ids_alert" }
      add_field => { "severity" => "high" }
    }

    if [alert][signature] =~ "(?i)scan" or [alert][signature] =~ "(?i)nmap" {
      mutate { replace => { "event_type" => "port_scan" } }
    }

    if [alert][signature] =~ "(?i)smb" or [alert][signature] =~ "(?i)lateral" {
      mutate { replace => { "event_type" => "lateral_movement_smb" } }
    }
  }

  # --- Wazuh alerts (forwarded via Filebeat) ---
  if [agent][name] and [rule][description] {
    mutate {
      add_field => { "wazuh_rule_id" => "%{[rule][id]}" }
      add_field => { "wazuh_description" => "%{[rule][description]}" }
    }

    if [rule][description] =~ "(?i)authentication failure" or [rule][description] =~ "(?i)failed" {
      mutate { add_field => { "event_type" => "failed_login" } }
      mutate { add_field => { "severity" => "low" } }
    }

    if [rule][description] =~ "(?i)multiple authentication failures" {
      mutate { replace => { "severity" => "high" } }
    }
  }

  # --- Direct JSON events (from test scripts / collectors) ---
  # These already have event_type, severity, etc. set — pass through
  if [event_type] and [source_ip] and [user] {
    # Already structured, nothing to do
  }

  # --- Generate unique event ID if missing ---
  # if ![event_id] {
  #   uuid {
  #     target => "event_id"
  #   }
  # }

  # --- Add ingest timestamp ---
  mutate {
    add_field => { "ingested_at" => "%{@timestamp}" }
  }
}

# ── OUTPUT ─────────────────────────────────────────────────
output {

  # Send everything to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"

    # Daily index: security-onprem-2025.01.15
    index => "security-onprem-%{+YYYY.MM.dd}"
  }

  # Debug: also print to stdout during development
  stdout {
    codec => rubydebug
  }
}
